name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. aftercode ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "v0.1.1 or git SHA"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where
      options:
        - CLI
        - Server / API
        - Web UI
        - Docker
        - Other
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: "OS, coding agent (Cursor/Claude Code/Codex), LLM + TTS provider"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server logs or CLI output. Redact API keys.
      render: shell
